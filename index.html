<body>

    <div class="header">
        <h1 class="menü-headline">Werder Bremen Spielplan</h1>

        <nav class="menü">

    <!-- Countdown -->
    <div class="container-countdown">
        <h1 id="countdown-label" style="font-size: 48px;">Matchday in:</h1>
        <div class="timebox">
            <div class="time">
                <h2 id="days">00</h2>
                <p>Tage</p>
            </div>
            <div class="time">
                <h2 id="hours">00</h2>
                <p>Stunden</p>
            </div>
            <div class="time">
                <h2 id="minutes">00</h2>
                <p>Minuten</p>
            </div>
            <div class="time">
                <h2 id="seconds">00</h2>
                <p>Sekunden</p>
            </div>
        </div>
    </div>

    <div class="bundesliga-aktuell">


        <nav class="month" style="color: rgb(29, 144, 83);">August</nav>


        <nav class="auswärtsspiel">
            <p class="mannschaft-schriftart-aktuell" style="color: rgb(255, 255, 255);">
                <img class="logo" src="clubs/Lüneburger_SK_Hansa_Logo.png" alt="Logo">
                Lüneburger SK Hansa - Werder Bremen
                <img class="logo" src="assets/SVW.png" alt="Logo SVW" style="width: 64px;">
            </p>
            <p class="daten" data-kickoff="2026-08-21T15:30:00" style="color: rgb(255, 255, 255); justify-content: center;">
                21.08.2026 Noch offen</p>
            <p class="bundesliga-titel" style="color: rgb(255, 255, 255); font-size: 24px">
                <img class="bundesliga-logo" style="width: 48px;" src="assets/DFB-Pokal.png" alt="DFB-Pokal Logo">DFB-Pokal
            </p>
        </nav>

    </div>



    <!-- Animierter Hintergrund (nicht anfassen) -->
    <div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <script src="script.js"></script>
    <!-- Die src muss ganz unten stehen -->
</body>

</html>
